name: PyPI release
description: Build distributions, publish them to PyPI with trusted publishing, and create a GitHub release.

inputs:
  python-version:
    description: Python version to use for the release job.
    required: false
    default: '3.12'
  package-dir:
    description: Directory containing the project to release.
    required: false
    default: '.'
  packages-dir:
    description: Directory containing built distributions.
    required: false
    default: 'dist/'

runs:
  using: composite
  steps:
  - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
    with:
      python-version: ${{ inputs.python-version }}
  - name: Install build tooling
    shell: bash
    working-directory: ${{ inputs.package-dir }}
    run: python -m pip install build
  - name: Build distributions
    shell: bash
    working-directory: ${{ inputs.package-dir }}
    run: python -m build
  - name: Publish package distributions to PyPI
    uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
    with:
      packages-dir: ${{ inputs.package-dir }}/${{ inputs.packages-dir }}
  - name: Create GitHub release
    shell: bash
    working-directory: ${{ inputs.package-dir }}
    env:
      GH_TOKEN: ${{ github.token }}
    run: gh release create "$GITHUB_REF_NAME" ${{ inputs.packages-dir }}* --verify-tag --generate-notes
