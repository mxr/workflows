name: PyPI release

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name to use for trusted publishing.
        required: false
        type: string
        default: pypi
      project:
        description: PyPI project name used for the environment URL.
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment }}
      url: ${{ format('https://pypi.org/p/{0}', inputs.project || github.event.repository.name) }}
    permissions:
      contents: write
      id-token: write
    steps:
    - name: Require tag ref
      shell: bash
      run: |
        if [ "$GITHUB_REF_TYPE" != tag ]; then
          echo "::error::PyPI release workflow must run on a tag ref"
          exit 1
        fi
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'
    - name: Install build tooling
      shell: bash
      run: python -m pip install build
    - name: Build distributions
      shell: bash
      run: python -m build
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        packages-dir: dist/
    - name: Create GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
