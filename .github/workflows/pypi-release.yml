name: PyPI release

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name to use for trusted publishing.
        required: false
        type: string
        default: pypi
      project:
        description: PyPI project name used for the environment URL.
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment }}
      url: ${{ format('https://pypi.org/p/{0}', inputs.project || github.event.repository.name) }}
    permissions:
      contents: write
      id-token: write
    steps:
    - name: Require tag ref
      shell: bash
      run: |
        if [ "$GITHUB_REF_TYPE" != tag ]; then
          echo "::error::PyPI release workflow must run on a tag ref"
          exit 1
        fi
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/pypi-release
