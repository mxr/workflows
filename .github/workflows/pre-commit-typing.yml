name: Pre-commit typing

on:
  workflow_call:

permissions: {}

jobs:
  pre-commit-typing:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Create typing-only pre-commit config
      id: config
      shell: bash
      run: |
        ruby <<'RUBY'
        require 'yaml'

        config = YAML.load_file('.pre-commit-config.yaml')
        python = config.dig('default_language_version', 'python')
        if python.nil?
          warn 'default_language_version.python is required'
          exit 1
        end

        repos = config.fetch('repos').filter_map do |repo|
          hooks = Array(repo['hooks']).select { |hook| %w[mypy ty].include?(hook['id']) }
          next if hooks.empty?

          repo.merge('hooks' => hooks)
        end

        if repos.empty?
          warn 'mypy or ty pre-commit hook is required'
          exit 1
        end

        File.write(
          '.pre-commit-config-typing.yaml',
          {
            'default_language_version' => {'python' => python},
            'repos' => repos,
          }.to_yaml,
        )

        File.open(ENV.fetch('GITHUB_OUTPUT'), 'a') do |f|
          f.puts "python-version=#{python.delete_prefix('python')}"
        end
        RUBY
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ steps.config.outputs.python-version }}
    - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      with:
        extra_args: --config .pre-commit-config-typing.yaml --all-files
