name: GitHub Workflow Immortality

on:
  schedule:
    - cron: "20 0 * * 0"
  workflow_dispatch:

jobs:
  keepalive:
    name: GitHub Workflow Immortality
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Keep cronjob based triggers of GitHub workflows alive
        uses: PhrozenByte/gh-workflow-immortality@v1.1.3
        with:
          secret: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          owner_repos: true
